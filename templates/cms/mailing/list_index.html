{% load i18n %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Listes mails — CMS CNT-SO</title>
<style>
body { font-family: sans-serif; background: #f9fafb; margin: 0; color: #1f2937; }
.header { background: #1e2229; color: #e2e8f0; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
.header a { color: #94a3b8; text-decoration: none; font-size: .875rem; }
.header a:hover { color: #fff; }
.container { max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
.picker { display: flex; gap: .75rem; align-items: stretch; }
.picker select {
  flex: 1;
  padding: .65rem 1rem;
  border: 1px solid #d1d5db;
  border-radius: 6px;
  font-size: .95rem;
  background: #fff;
  cursor: pointer;
  appearance: auto;
}
.picker select:focus { outline: none; border-color: #e63946; box-shadow: 0 0 0 2px rgba(230,57,70,.15); }
.btn { display: inline-flex; align-items: center; padding: .65rem 1.25rem; border-radius: 6px; font-size: .95rem; font-weight: 600; text-decoration: none; cursor: pointer; border: none; white-space: nowrap; }
.btn-primary { background: #e63946; color: #fff; }
.btn-primary:hover { background: #c0303b; }
.btn-primary:disabled { background: #f9a8b0; cursor: not-allowed; }
.hint { font-size: .8rem; color: #9ca3af; margin-top: .6rem; }
.error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; padding: 1rem; border-radius: 6px; }
</style>
</head>
<body>
<div class="header">
  <a href="/cms/">← Tableau de bord</a>
  <span style="color:#4b5563;">/</span>
  <span>Listes mails OVH</span>
</div>
<div class="container">
  <h1>Listes mails — cnt-so.info</h1>
  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% else %}
  <div class="picker">
    <select id="list-select">
      <option value="">— Choisir une liste ({{ lists|length }}) —</option>
      {% for lst in lists %}
      <option value="{{ lst.name }}">{{ lst.name }} ({{ lst.count }} abonné{{ lst.count|pluralize }})</option>
      {% endfor %}
    </select>
    <button id="go-btn" class="btn btn-primary" disabled onclick="goToList()">Gérer</button>
  </div>
  <p class="hint">Sélectionnez une liste puis cliquez Gérer pour l'administrer.</p>
  {% endif %}
</div>
<script>
(function() {
  var sel = document.getElementById('list-select');
  var btn = document.getElementById('go-btn');
  if (!sel) return;
  sel.addEventListener('change', function() {
    btn.disabled = !this.value;
  });
  sel.addEventListener('dblclick', function() {
    if (this.value) goToList();
  });
})();
function goToList() {
  var v = document.getElementById('list-select').value;
  if (v) window.location.href = '/cms/mailing-lists/' + v + '/';
}
</script>
</body>
</html>
