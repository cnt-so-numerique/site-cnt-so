{% load wagtailimages_tags %}
<div class="article-gallery" style="display:grid;grid-template-columns:repeat({{ value.columns }},1fr);gap:6px;margin:1.5rem 0;">
  {% for item in value.images %}
    <figure style="margin:0;aspect-ratio:1;overflow:hidden;border-radius:4px;">
      {% image item.image fill-400x400 as img %}
      <img src="{{ img.url }}" alt="{{ item.image.title }}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">
      {% if item.caption %}<figcaption style="font-size:.75rem;color:#6b7280;padding:.25rem 0;">{{ item.caption }}</figcaption>{% endif %}
    </figure>
  {% endfor %}
</div>
