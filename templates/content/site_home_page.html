  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#EC1A2E',
          },
          typography: {
            DEFAULT: {
              css: {
                color: '#f3f4f6',
                a: { color: '#EC1A2E' },
                strong: { color: '#f9fafb' },
                h1: { color: '#ffffff' },
                h2: { color: '#ffffff' },
                h3: { color: '#ffffff' },
              }
            }
          }
        }
      },
      plugins: []
    }
  </script>
  <style>
    .prose h2 { color: #fff; }
    .prose h3 { color: #fff; }
    .prose p  { color: #d1d5db; }
    .prose li { color: #d1d5db; }
    .prose a  { color: #EC1A2E; }
    .prose strong { color: #f9fafb; }
    .text-primary { color: #EC1A2E; }
  </style>
</head>
