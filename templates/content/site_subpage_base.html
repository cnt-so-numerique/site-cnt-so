{% extends 'base.html' %}

{% block extra_css %}
<style>
/* ── STUCS sub-pages — thème standard ─────────────────────────── */
.s-page { padding: 1.5rem 0; }

.s-section-title {
  font-family: var(--font-heading);
  font-size: 1.55rem;
  color: var(--text-color);
  border-left: 3px solid var(--primary-color);
  padding-left: .8rem;
  margin-bottom: 1.5rem;
}

.s-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.5rem; }

.s-card {
  background: var(--white);
  border: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  transition: border-color .2s, box-shadow .2s;
  overflow: hidden;
}
.s-card:hover { border-color: var(--primary-color); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.s-card-img { height: 185px; overflow: hidden; background: var(--bg-lighter); flex-shrink: 0; }
.s-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s; }
.s-card:hover .s-card-img img { transform: scale(1.05); }
.s-card-body { padding: 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: .4rem; }
.s-card-cat { font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--primary-color); }
.s-card-title { font-family: var(--font-heading); font-size: 1.05rem; color: var(--text-color); line-height: 1.35; flex: 1; }
.s-card-title a { color: inherit; }
.s-card-title a:hover { color: var(--primary-color); }
.s-card-date { font-size: .73rem; color: var(--text-muted); margin-top: .2rem; }

.btn-red {
  display: inline-block;
  background: var(--primary-color);
  color: var(--white) !important;
  padding: .7rem 1.6rem;
  font-weight: 700;
  font-size: .85rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: .4px;
  transition: background .15s;
}
.btn-red:hover { background: var(--primary-dark); text-decoration: none; }

.btn-outline {
  display: inline-block;
  border: 2px solid var(--primary-color);
  color: var(--primary-color) !important;
  padding: .65rem 1.5rem;
  font-weight: 700;
  font-size: .85rem;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: .4px;
  transition: background .15s, color .15s;
}
.btn-outline:hover { background: var(--primary-color); color: var(--white) !important; text-decoration: none; }

.s-field { margin-bottom: 1.1rem; }
.s-label { display: block; font-size: .82rem; color: var(--text-secondary); margin-bottom: .35rem; font-weight: 600; }
.s-input, .s-textarea {
  width: 100%;
  padding: .65rem 1rem;
  background: var(--white);
  border: 1px solid var(--border-color);
  color: var(--text-color);
  font-family: var(--font-body);
  font-size: .9rem;
  border-radius: 3px;
  outline: none;
  transition: border-color .15s;
}
.s-input:focus, .s-textarea:focus { border-color: var(--primary-color); }
.s-textarea { min-height: 110px; resize: vertical; }

/* Variables legacy pour les templates existants */
:root {
  --red: var(--primary-color);
  --red-dark: var(--primary-dark);
  --border: var(--border-color);
  --muted: var(--text-muted);
  --heading: var(--font-heading);
  --body: var(--font-body);
}
</style>
{% block extra_head %}{% endblock %}
{% endblock extra_css %}

{% block sidebar %}{% include "content/_sectoral_sidebar.html" %}{% endblock %}
