<style>
.article-share {
    margin-top: 2rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--bg-lighter);
}
.article-share-title {
    font-size: 1rem;
    margin: 0 0 .25rem;
    color: var(--text-secondary);
}
.share-buttons { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .5rem; }
.si-linkedin  { background: #0A66C2; }
.si-whatsapp  { background: #25D366; }
.si-mail      { background: #6b7280; }
.si-share     { background: #374151; }
</style>

<script>
(function() {
    var shareData = { title: '{{ article.title|escapejs }}', url: window.location.href };
    var igBtn = document.getElementById('btn-ig-share');
    var nativeBtn = document.getElementById('btn-native-share');
    if (navigator.share) {
        igBtn.addEventListener('click', function() { navigator.share(shareData); });
        nativeBtn.style.display = 'inline-flex';
        nativeBtn.addEventListener('click', function() { navigator.share(shareData); });
    } else {
        igBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(window.location.href).then(function() {
                igBtn.title = 'Lien copié !';
                setTimeout(function() { igBtn.title = 'Partager sur Instagram'; }, 2000);
            });
        });
    }
})();
</script>
