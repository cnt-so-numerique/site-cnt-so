<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Rédaction CNT-SO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1d23; --card-bg: #1e2229; --border: #2d3139;
    --accent: #e63946; --text: #e2e8f0; --text-muted: #94a3b8;
    --input-bg: #252932;
  }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .login-wrap {
    width: 100%; max-width: 380px; padding: 1rem;
  }
  .login-logo {
    text-align: center; margin-bottom: 2rem;
  }
  .login-logo span {
    font-size: 1.5rem; font-weight: 800;
    color: var(--accent); letter-spacing: .5px;
  }
  .login-logo p {
    font-size: .8rem; color: var(--text-muted); margin-top: .2rem;
  }
  .login-card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 2rem;
  }
  .field { margin-bottom: 1.2rem; }
  .field label {
    display: block; font-size: .8rem; font-weight: 500;
    color: var(--text-muted); margin-bottom: .3rem;
  }
  .field input {
    width: 100%; background: var(--input-bg);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-size: .95rem; padding: .55rem .8rem;
    transition: border-color .15s;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .btn-submit {
    width: 100%; background: var(--accent); color: #fff;
    border: none; border-radius: 6px; padding: .65rem;
    font-size: .95rem; font-weight: 600; cursor: pointer;
    transition: opacity .15s;
  }
  .btn-submit:hover { opacity: .85; }
  .error-box {
    background: rgba(239,68,68,.1); color: #f87171;
    border-radius: 6px; padding: .6rem .8rem;
    font-size: .85rem; margin-bottom: 1rem;
  }
  .errorlist { list-style: none; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <span>CNT-SO</span>
    <p>Espace de rédaction</p>
  </div>
  <div class="login-card">
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
      <div class="error-box">Identifiants incorrects. Réessayez.</div>
      {% endif %}
      <div class="field">
        <label for="id_username">Nom d'utilisateur</label>
        <input type="text" id="id_username" name="username" autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="id_password">Mot de passe</label>
        <input type="password" id="id_password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Se connecter</button>
    </form>
  </div>
</div>
</body>
</html>
