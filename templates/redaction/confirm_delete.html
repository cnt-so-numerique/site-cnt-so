{% extends "redaction/base.html" %}
{% block title %}Supprimer — Rédaction{% endblock %}
{% block content %}
<div style="max-width:480px; margin:3rem auto;">
  <div class="card" style="padding:2rem; text-align:center;">
    <div style="font-size:2.5rem; margin-bottom:1rem;">🗑️</div>
    <h2 style="margin-bottom:.5rem; color:#e2e8f0;">Confirmer la suppression</h2>
    <p style="color:#94a3b8; margin-bottom:1.5rem;">
      Supprimer {{ object_type }} <strong style="color:#e2e8f0;">« {{ object_name }} »</strong> ?
      <br><span style="font-size:.85rem;">Cette action est irréversible.</span>
    </p>
    <form method="post" style="display:flex; gap:.75rem; justify-content:center;">
      {% csrf_token %}
      <a href="{{ cancel_url }}" class="btn btn-secondary">Annuler</a>
      <button type="submit" class="btn btn-danger">Supprimer</button>
    </form>
  </div>
</div>
{% endblock %}
