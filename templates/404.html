<!DOCTYPE html>
{% load menu_tags %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable — CNT-SO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #EC1C24;
            --font-heading: 'Amiri', serif;
            --font-body: 'Noto Sans', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: #f1f1f1;
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        .code {
            font-family: var(--font-heading);
            font-size: 8rem;
            line-height: 1;
            color: var(--primary-color);
            font-weight: 700;
        }
        h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin: 1rem 0 0.5rem;
        }
        p {
            color: #6c6c6c;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: #fff;
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            font-weight: 600;
            border-radius: 3px;
            margin: 0.25rem;
            transition: background 0.2s;
        }
        .btn:hover { background: #c01018; }
        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        .btn-secondary:hover { background: var(--primary-color); color: #fff; }
        .divider {
            border: none;
            border-top: 3px solid var(--primary-color);
            width: 60px;
            margin: 1.5rem auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <hr class="divider">
        <h1>Page introuvable</h1>
        <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
        <a href="/" class="btn">← Retour à l'accueil</a>
        <a href="javascript:history.back()" class="btn btn-secondary">Page précédente</a>
    </div>
</body>
</html>
