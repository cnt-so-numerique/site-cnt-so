{% extends 'base.html' %}

{% block title %}Adhésion – {{ site.name }}{% endblock %}

{% block extra_css %}
<style>
    .adhesion-form { max-width: 640px; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-color); }
    .form-input, .form-textarea, .form-select {
        width: 100%; padding: 0.75rem; border: 1px solid #ddd;
        border-radius: 4px; font-size: 1rem; font-family: inherit; background: white;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
        outline: none; border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(236, 28, 36, 0.1);
    }
    .form-textarea { resize: vertical; min-height: 100px; }
    .form-radio-group { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem; }
    .form-radio-label { display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer; font-weight: normal; }
    .error-list { color: #c00; font-size: 0.875rem; margin-top: 0.25rem; list-style: none; padding: 0; }
    .required-note { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem; }
    .section-title-form { font-size: 1.05rem; font-weight: 700; border-bottom: 2px solid var(--primary-color); padding-bottom: 0.4rem; margin: 2rem 0 1rem; }
    .signature-block { background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .signature-block p { font-size: 0.95rem; color: #444; margin-bottom: 0.75rem; }
    .btn-submit { background: var(--primary-color); color: white; border: none; padding: 0.85rem 2.5rem; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
    .btn-submit:hover { background: var(--primary-dark); }
</style>
{% endblock %}

{% block content %}
{% include 'adhesion/_formulaire_body.html' %}
{% endblock %}
