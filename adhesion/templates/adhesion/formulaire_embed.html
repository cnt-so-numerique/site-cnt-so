<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhésion – {{ site.name }}</title>
<style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; padding: 1.25rem; background: white; color: #333; margin: 0; }
    .adhesion-form { max-width: 100%; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 500; }
    .form-input, .form-textarea, .form-select {
        width: 100%; padding: 0.65rem; border: 1px solid #ddd;
        border-radius: 4px; font-size: 1rem; font-family: inherit; background: white;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
        outline: none; border-color: #EC1C24; box-shadow: 0 0 0 2px rgba(236,28,36,.1);
    }
    .form-textarea { resize: vertical; min-height: 100px; }
    .form-radio-group { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.2rem; }
    .form-radio-label { display: flex; align-items: flex-start; gap: 0.5rem; cursor: pointer; font-weight: normal; }
    .error-list { color: #c00; font-size: 0.85rem; margin-top: 0.2rem; list-style: none; padding: 0; }
    .required-note { font-size: 0.85rem; color: #666; margin-bottom: 1.25rem; }
    .section-title-form { font-size: 1rem; font-weight: 700; border-bottom: 2px solid #EC1C24; padding-bottom: 0.3rem; margin: 1.75rem 0 .9rem; color: #222; }
    .signature-block { background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; padding: .9rem 1rem; margin-bottom: 1.25rem; }
    .signature-block p { font-size: 0.9rem; color: #444; margin-bottom: 0.6rem; }
    .btn-submit { background: #EC1C24; color: white; border: none; padding: 0.75rem 2rem; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; }
    .btn-submit:hover { background: #c71219; }
    h1 { font-size: 1.3rem; color: #EC1C24; margin-bottom: .4rem; }
</style>
</head>
<body>
{% include 'adhesion/_formulaire_body.html' %}
</body>
</html>
