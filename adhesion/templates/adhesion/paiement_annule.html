{% extends 'base.html' %}

{% block title %}Paiement annulé – {{ site.name }}{% endblock %}

{% block content %}
<div style="max-width:600px;text-align:center;padding:3rem 1rem;">
    <h1 class="section-title">Paiement annulé</h1>
    <p style="color:#555;margin-bottom:2rem;">
        Votre paiement a été annulé. Aucun prélèvement n'a été effectué.<br>
        Vous pouvez recommencer votre adhésion à tout moment.
    </p>
    <a href="{% url 'adhesion:formulaire' site_slug=site.slug %}"
       style="background:#EC1C24;color:white;padding:.75rem 2rem;border-radius:4px;text-decoration:none;font-weight:600;">
        Recommencer
    </a>
</div>
{% endblock %}
